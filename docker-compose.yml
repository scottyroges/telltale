services:
  postgres:
    image: postgres:16-alpine
    container_name: telltale-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: telltale
      POSTGRES_USER: telltale
      POSTGRES_PASSWORD: telltale
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telltale"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
